[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "evalrag"
version = "0.1.0"
description = "Single-doc RAG with live trust scores and auto-generated eval sets"
requires-python = ">=3.12,<3.13"
dependencies = [
  "fastapi>=0.115",
  "uvicorn[standard]>=0.32",
  "pydantic>=2.9",
  "pydantic-settings>=2.6",
  "python-multipart>=0.0.12",
  "sqlalchemy>=2.0",
  "alembic>=1.14",
  "psycopg[binary]>=3.2",
  "pgvector>=0.3.6",
  "anthropic>=0.39",
  "openai>=1.54",
  "sentence-transformers>=3.3",
  "llama-index-core>=0.12",
  "llama-index-readers-file>=0.4",
  "pypdf>=5.1",
  "pdfplumber>=0.11",
  "python-docx>=1.1",
  "ragas>=0.2",
  "langfuse>=2.55",
  "streamlit>=1.40",
  "httpx>=0.27",
  "tenacity>=9.0",
  "structlog>=24.4",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.3",
  "pytest-asyncio>=0.24",
  "pytest-cov>=6.0",
  "ruff>=0.8",
  "mypy>=1.13",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM"]

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-ra --strict-markers"
markers = [
  "integration: requires live postgres",
  "slow: takes >2s",
  "llm: makes real LLM API calls (skipped by default)",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
